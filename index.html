<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumaScale Image Upscaler</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand" aria-label="LumaScale">
          <div class="brand-mark">L</div>
          <div>
            <h1>LumaScale</h1>
            <p data-i18n="appSubtitle">이미지 업스케일러</p>
          </div>
        </div>
        <div class="top-actions">
          <div class="language-toggle" role="group" aria-label="Language">
            <button class="lang-button active" type="button" data-locale="ko">KO</button>
            <button class="lang-button" type="button" data-locale="en">EN</button>
          </div>
          <input id="fileInput" type="file" accept="image/*" hidden />
          <button class="button secondary" id="openButton" type="button" data-i18n="open">열기</button>
          <button class="button primary" id="downloadButton" type="button" disabled data-i18n="export">
            내보내기
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="controls" aria-label="업스케일 설정" data-i18n-aria-label="controlsAria">
          <section class="dropzone" id="dropZone" tabindex="0">
            <div class="drop-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img">
                <path d="M12 3v12m0-12 4 4m-4-4-4 4M5 15v4h14v-4" />
              </svg>
            </div>
            <strong data-i18n="dropTitle">이미지 놓기</strong>
            <span>PNG, JPG, WebP</span>
          </section>

          <section class="control-group">
            <div class="label-row">
              <label data-i18n="outputSize">출력 크기</label>
              <output id="scaleOutput">2x</output>
            </div>
            <div class="segmented" role="group" aria-label="업스케일 배율" data-i18n-aria-label="scaleAria">
              <button type="button" class="segment active" data-scale="2">2x</button>
              <button type="button" class="segment" data-scale="3">3x</button>
              <button type="button" class="segment" data-scale="4">4x</button>
              <button type="button" class="segment" data-output-width="13500" data-output-height="10500">13.5K</button>
            </div>
            <div class="dimension-grid">
              <label>
                <span>W</span>
                <input id="widthInput" type="number" min="1" max="16384" inputmode="numeric" />
              </label>
              <label>
                <span>H</span>
                <input id="heightInput" type="number" min="1" max="16384" inputmode="numeric" />
              </label>
            </div>
          </section>

          <section class="control-group">
            <label for="methodSelect" data-i18n="method">방식</label>
            <select id="methodSelect">
              <option value="detail" data-i18n="detailMode">디테일 보정</option>
              <option value="smooth" data-i18n="smoothMode">부드럽게</option>
              <option value="pixel" data-i18n="pixelMode">픽셀 아트</option>
            </select>
          </section>

          <section class="control-group">
            <label for="fitModeSelect" data-i18n="fitMode">비율 처리</label>
            <select id="fitModeSelect">
              <option value="cover" data-i18n="coverMode">채우기</option>
              <option value="contain" data-i18n="containMode">전체</option>
              <option value="stretch" data-i18n="stretchMode">늘이기</option>
            </select>
          </section>

          <section class="control-group">
            <div class="label-row">
              <label for="sharpnessRange" data-i18n="sharpness">선명도</label>
              <output id="sharpnessOutput">42</output>
            </div>
            <input id="sharpnessRange" type="range" min="0" max="80" value="42" />
          </section>

          <section class="control-group">
            <label for="formatSelect" data-i18n="fileFormat">파일 형식</label>
            <select id="formatSelect">
              <option value="image/png">PNG</option>
              <option value="image/jpeg">JPEG</option>
              <option value="image/webp">WebP</option>
            </select>
          </section>

          <section class="control-group">
            <div class="label-row">
              <label for="qualityRange" data-i18n="quality">품질</label>
              <output id="qualityOutput">92%</output>
            </div>
            <input id="qualityRange" type="range" min="60" max="100" value="92" />
          </section>

          <section class="metadata" aria-label="이미지 정보" data-i18n-aria-label="metadataAria">
            <div>
              <span data-i18n="original">원본</span>
              <strong id="originalSize">-</strong>
            </div>
            <div>
              <span data-i18n="output">출력</span>
              <strong id="outputSize">-</strong>
            </div>
            <div>
              <span data-i18n="memory">예상 메모리</span>
              <strong id="memorySize">-</strong>
            </div>
          </section>
        </aside>

        <section class="preview" aria-label="이미지 미리보기" data-i18n-aria-label="previewAria">
          <div class="preview-toolbar">
            <div class="view-tabs" role="group" aria-label="미리보기 모드" data-i18n-aria-label="viewModeAria">
              <button type="button" class="tab active" data-view="compare" data-i18n="compare">비교</button>
              <button type="button" class="tab" data-view="result" data-i18n="result">결과</button>
              <button type="button" class="tab" data-view="base" data-i18n="base">원본</button>
            </div>
            <div class="zoom-actions" role="group" aria-label="확대" data-i18n-aria-label="zoomAria">
              <button
                type="button"
                class="icon-button"
                id="fitButton"
                title="맞춤"
                aria-label="맞춤"
                data-i18n-title="fit"
                data-i18n-aria-label="fit"
              >
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5M8 8h8v8H8z" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-button"
                id="zoomOutButton"
                title="축소"
                aria-label="축소"
                data-i18n-title="zoomOut"
                data-i18n-aria-label="zoomOut"
              >
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M5 12h14" />
                </svg>
              </button>
              <button
                type="button"
                class="icon-button"
                id="zoomInButton"
                title="확대"
                aria-label="확대"
                data-i18n-title="zoomIn"
                data-i18n-aria-label="zoomIn"
              >
                <svg viewBox="0 0 24 24" role="img">
                  <path d="M12 5v14M5 12h14" />
                </svg>
              </button>
            </div>
          </div>

          <div class="stage" id="stage">
            <div class="empty-state" id="emptyState">
              <strong data-i18n="emptyTitle">이미지를 선택하세요</strong>
              <span data-i18n="emptyHint">왼쪽 패널에서 파일을 열 수 있습니다</span>
            </div>

            <div class="compare-frame hidden" id="compareFrame">
              <canvas id="baseCanvas"></canvas>
              <div class="result-clip" id="resultClip">
                <canvas id="resultCanvas"></canvas>
              </div>
              <div class="split-line" id="splitLine" aria-hidden="true"></div>
              <input
                id="splitRange"
                class="split-range"
                type="range"
                min="0"
                max="100"
                value="55"
                aria-label="비교 위치"
                data-i18n-aria-label="comparePosition"
              />
            </div>
          </div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="statusText">대기 중</span>
        <span id="fileName">파일 없음</span>
      </footer>
    </div>
  </body>
</html>
